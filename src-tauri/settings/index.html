<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack Todos — Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fff;
      --fg: #1a1a1a;
      --input-bg: #fff;
      --input-border: #ccc;
      --btn-bg: #007aff;
      --btn-fg: #fff;
      --btn-secondary-bg: #e5e5e5;
      --btn-secondary-fg: #333;
      --hint-color: #888;
      --success-bg: #d4edda;
      --success-fg: #155724;
      --error-bg: #f8d7da;
      --error-fg: #721c24;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --fg: #e0e0e0;
        --input-bg: #2a2a2a;
        --input-border: #555;
        --btn-bg: #0a84ff;
        --btn-secondary-bg: #3a3a3a;
        --btn-secondary-fg: #e0e0e0;
        --hint-color: #999;
        --success-bg: #1a3a2a;
        --success-fg: #75d4a2;
        --error-bg: #3a1a1a;
        --error-fg: #d47575;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 24px;
      font-size: 13px;
      -webkit-user-select: none;
      user-select: none;
    }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .hint { font-size: 11px; color: var(--hint-color); margin-top: 2px; }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--fg);
      font-size: 13px;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: var(--btn-bg);
      box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.25);
    }
    .row { display: flex; gap: 8px; align-items: flex-start; }
    .row input { flex: 1; }
    .row button { padding: 6px 12px; white-space: nowrap; }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 24px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary { background: var(--btn-bg); color: var(--btn-fg); }
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--btn-secondary-fg); }
    button:active { opacity: 0.8; }
    #message {
      display: none;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    #message.success { display: block; background: var(--success-bg); color: var(--success-fg); }
    #message.error { display: block; background: var(--error-bg); color: var(--error-fg); }
  </style>
</head>
<body>
  <h2>Settings</h2>
  <form id="settings-form">
    <div class="field">
      <label for="slack-user-token">Slack User Token</label>
      <input type="password" id="slack-user-token" placeholder="xoxp-..." autocomplete="off">
    </div>
    <div class="field">
      <label for="slack-app-token">Slack App Token</label>
      <input type="password" id="slack-app-token" placeholder="xapp-..." autocomplete="off">
    </div>
    <div class="field">
      <label for="slack-user-id">Slack User ID</label>
      <input type="text" id="slack-user-id" placeholder="U0XXXXXXXXX">
    </div>
    <div class="field">
      <label for="todo-emoji">Todo Emoji</label>
      <input type="text" id="todo-emoji" placeholder="yyk-todo">
      <div class="hint">Comma-separated for multiple</div>
    </div>
    <div class="field">
      <label for="todo-file-path">Todo File Path</label>
      <div class="row">
        <input type="text" id="todo-file-path" placeholder="/Users/.../vault/Slack-Todos.md">
        <button type="button" id="browse" class="btn-secondary">Browse…</button>
      </div>
      <div class="hint">Full path including filename (e.g. /Users/you/vault/Slack-Todos.md)</div>
    </div>
    <div class="field">
      <label for="todo-suffix">Todo Suffix</label>
      <input type="text" id="todo-suffix" placeholder="⏳ {{date}}">
      <div class="hint">Appended to each todo. Use {{date}} for today's date (YYYY-MM-DD)</div>
    </div>
    <div class="actions">
      <button type="button" id="cancel" class="btn-secondary">Cancel</button>
      <button type="submit" class="btn-primary">Save</button>
    </div>
  </form>
  <div id="message"></div>
  <script src="settings.js"></script>
</body>
</html>
